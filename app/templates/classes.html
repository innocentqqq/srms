{% extends "base.html" %}
{% block title %}Classes - SRMS{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-center border-bottom border-secondary">
                <h5 class="text-white" id="userName">Loading...</h5>
                <small class="text-white-50" id="userRole">-</small>
            </div>
            <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/admin/teachers"><i class="bi bi-person-badge me-2"></i> Teachers</a>
            <a href="/admin/students" id="navStudents"><i class="bi bi-people me-2"></i> Students</a>
            <a href="/admin/classes" class="active"><i class="bi bi-grid me-2"></i> Classes</a>
            <a href="/admin/subjects" id="navSubjects"><i class="bi bi-book me-2"></i> Subjects</a>
            <a href="/admin/exams" id="navExams"><i class="bi bi-clipboard me-2"></i> Exams</a>
            <a href="/teacher/marks" id="navMarks"><i class="bi bi-pencil-square me-2"></i> Enter Marks</a>
            <a href="/results"><i class="bi bi-bar-chart me-2"></i> Results</a>
            <a href="/" onclick="localStorage.removeItem('token');localStorage.removeItem('user');"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4">Class Management</h2>
            <div class="card p-4">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#classModal">Add Class</button>
                <table class="table" id="classesTable">
                    <thead><tr><th>ID</th><th>Class Name</th><th>Year</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="classModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Add Class</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="classForm">
                <div class="modal-body">
                    <div class="mb-3"><label>Class Name</label><input type="text" class="form-control" name="class_name" required></div>
                    <div class="mb-3"><label>Year</label><input type="number" class="form-control" name="year" value="2024" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Save</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token || !user.role || user.role !== 'admin') {
    window.location.href = '/dashboard';
}
document.getElementById('userName').textContent = user.full_name || 'User';
document.getElementById('userRole').textContent = (user.role || '').toUpperCase();

const api = axios.create({ baseURL: '', headers: { Authorization: `Bearer ${token}` } });

if (user.role === 'admin') {
    document.getElementById('navStudents').style.display = 'block';
    document.getElementById('navSubjects').style.display = 'block';
    document.getElementById('navExams').style.display = 'block';
    document.getElementById('navMarks').style.display = 'block';
} else if (user.role === 'teacher') {
    document.getElementById('navMarks').style.display = 'block';
}

async function loadClasses() {
    const res = await api.get('/api/classes');
    document.querySelector('#classesTable tbody').innerHTML = res.data.map(c => `<tr>
        <td>${c.id}</td><td>${c.class_name}</td><td>${c.year}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteClass(${c.id})">Delete</button></td>
    </tr>`).join('');
}

async function deleteClass(id) {
    if (!confirm('Delete this class?')) return;
    await api.delete(`/api/classes/${id}`);
    loadClasses();
}

document.getElementById('classForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    await api.post('/api/classes', Object.fromEntries(formData));
    window.location.reload();
});
loadClasses();
</script>
{% endblock %}
