{% extends "base.html" %}
{% block title %}Results - SRMS{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-center border-bottom border-secondary">
                <h5 class="text-white" id="userName">Loading...</h5>
                <small class="text-white-50" id="userRole">-</small>
            </div>
            <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/admin/students" id="navStudents"><i class="bi bi-people me-2"></i> Students</a>
            <a href="/admin/classes" id="navClasses"><i class="bi bi-grid me-2"></i> Classes</a>
            <a href="/admin/subjects" id="navSubjects"><i class="bi bi-book me-2"></i> Subjects</a>
            <a href="/admin/exams" id="navExams"><i class="bi bi-clipboard me-2"></i> Exams</a>
            <a href="/teacher/marks" id="navMarks"><i class="bi bi-pencil-square me-2"></i> Enter Marks</a>
            <a href="/results" class="active"><i class="bi bi-bar-chart me-2"></i> Results</a>
            <a href="/" onclick="localStorage.removeItem('token');localStorage.removeItem('user');"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4">Results</h2>
            <div class="card p-4 mb-4">
                <div class="row">
                    <div class="col-md-4">
                        <label>Select Exam</label>
                        <select class="form-control" id="examSelect"></select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadResults()">View Results</button>
                    </div>
                </div>
            </div>
            <div class="card p-4" id="resultsCard" style="display:none;">
                <h5>Exam Results</h5>
                <table class="table" id="resultsTable">
                    <thead><tr><th>Rank</th><th>Student ID</th><th>Name</th><th>Total</th><th>Average</th><th>GPA</th><th>Report Card</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token || !user.role) {
    window.location.href = '/login';
}
document.getElementById('userName').textContent = user.full_name || 'User';
document.getElementById('userRole').textContent = (user.role || '').toUpperCase();

if (user.role === 'admin') {
    document.getElementById('navStudents').style.display = 'block';
    document.getElementById('navClasses').style.display = 'block';
    document.getElementById('navSubjects').style.display = 'block';
    document.getElementById('navExams').style.display = 'block';
    document.getElementById('navMarks').style.display = 'block';
} else if (user.role === 'teacher') {
    document.getElementById('navMarks').style.display = 'block';
}

const api = axios.create({ baseURL: '', headers: { Authorization: `Bearer ${token}` } });

async function init() {
    const exams = await api.get('/api/exams');
    document.getElementById('examSelect').innerHTML = exams.data.map(e => `<option value="${e.id}">${e.exam_name} - ${e.term} ${e.year}</option>`).join('');
}

async function loadResults() {
    const examId = document.getElementById('examSelect').value;
    const res = await api.get(`/api/results/exam/${examId}`);
    document.querySelector('#resultsTable tbody').innerHTML = res.data.map(r => `<tr>
        <td>${r.rank}</td><td>${r.student_number}</td><td>${r.student_name}</td>
        <td>${r.total_marks}</td><td>${r.average}</td><td>${r.gpa}</td>
        <td><a href="/report-card/${r.student_id}/${examId}" class="btn btn-sm btn-primary">View</a></td>
    </tr>`).join('');
    document.getElementById('resultsCard').style.display = 'block';
}
init();
</script>
{% endblock %}
