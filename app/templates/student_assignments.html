{% extends "base.html" %}
{% block title %}My Assignments - SRMS{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-center border-bottom border-secondary">
                <h5 class="text-white" id="userName">Student</h5>
                <small class="text-white-50">STUDENT</small>
            </div>
            <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/student/assignments" class="active"><i class="bi bi-pencil-square me-2"></i> My Assignments</a>
            <a href="/results"><i class="bi bi-bar-chart me-2"></i> Results</a>
            <a href="/" onclick="localStorage.removeItem('token');"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4">My Assignments</h2>
            <div class="card p-4">
                <div id="assignmentsList" class="list-group">
                    <p class="text-muted">Loading assignments...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Submit Modal -->
<div class="modal fade" id="submitModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Submit Assignment</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="submitForm">
                <div class="modal-body">
                    <input type="hidden" id="submitAssignmentId" name="assignment_id">
                    <div class="mb-3"><label>Submission Link / File Path</label><input type="text" class="form-control" name="file_path" required placeholder="Paste your Google Drive link here"></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Submit Now</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const token = localStorage.getItem('token');
const api = axios.create({ baseURL: '', headers: { Authorization: `Bearer ${token}` } });

async function loadAssignments() {
    try {
        // Fetch all assignments for all subjects enrolled
        const subjects = await api.get('/api/subjects');
        const list = document.getElementById('assignmentsList');
        list.innerHTML = '';
        
        for (const sub of subjects.data) {
            const res = await api.get(`/api/teacher/assignments/${sub.id}`);
            if (res.data.length > 0) {
                list.innerHTML += `<h6>${sub.subject_name}</h6>`;
                res.data.forEach(a => {
                    list.innerHTML += `
                        <div class="list-group-item d-flex justify-content-between align-items-center mb-2 shadow-sm border-0">
                            <div>
                                <strong>${a.title}</strong><br>
                                <small class="text-danger">Due: ${new Date(a.due_date).toLocaleString()}</small>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="openSubmitModal(${a.id})">Submit</button>
                        </div>
                    `;
                });
            }
        }
        if (list.innerHTML === '') list.innerHTML = '<p class="text-muted">No assignments found.</p>';
    } catch (e) { console.error(e); }
}

function openSubmitModal(id) {
    document.getElementById('submitAssignmentId').value = id;
    new bootstrap.Modal(document.getElementById('submitModal')).show();
}

document.getElementById('submitForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    try {
        await api.post('/api/lms/submissions', data);
        alert('Submitted successfully!');
        location.reload();
    } catch (err) { alert('Error submitting'); }
});

loadAssignments();
</script>
{% endblock %}
