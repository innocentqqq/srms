{% extends "base.html" %}
{% block title %}My Children - SRMS{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-center border-bottom border-secondary">
                <h5 class="text-white" id="userName">Parent</h5>
                <small class="text-white-50">PARENT</small>
            </div>
            <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/parent/children" class="active"><i class="bi bi-person-heart me-2"></i> My Children</a>
            <a href="/" onclick="localStorage.removeItem('token');"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4">My Children</h2>
            <div id="childrenList" class="row">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const token = localStorage.getItem('token');
const api = axios.create({ baseURL: '', headers: { Authorization: `Bearer ${token}` } });

async function loadChildren() {
    try {
        const res = await api.get('/api/parents/my-children');
        const list = document.getElementById('childrenList');
        if (res.data.length === 0) {
            list.innerHTML = '<div class="col-12"><div class="alert alert-warning">No children linked to this account. Please contact Admin.</div></div>';
            return;
        }
        list.innerHTML = res.data.map(c => `
            <div class="col-md-4 mb-4">
                <div class="card p-3 shadow-sm border-0">
                    <h5>${c.name}</h5>
                    <p class="text-muted small mb-2">Student ID: ${c.student_id}</p>
                    <div class="d-grid gap-2">
                        <a href="/results?student_id=${c.id}" class="btn btn-sm btn-outline-primary">View Grades</a>
                        <button class="btn btn-sm btn-outline-info" onclick="viewAttendance(${c.id})">Attendance History</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) {
        console.error(e);
    }
}
loadChildren();
</script>
{% endblock %}
