{% extends "base.html" %}
{% block title %}Exams - SRMS{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-center border-bottom border-secondary">
                <h5 class="text-white" id="userName">Loading...</h5>
                <small class="text-white-50" id="userRole">-</small>
            </div>
            <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="/admin/teachers"><i class="bi bi-person-badge me-2"></i> Teachers</a>
            <a href="/admin/students" id="navStudents"><i class="bi bi-people me-2"></i> Students</a>
            <a href="/admin/classes" id="navClasses"><i class="bi bi-grid me-2"></i> Classes</a>
            <a href="/admin/subjects" id="navSubjects"><i class="bi bi-book me-2"></i> Subjects</a>
            <a href="/admin/exams" class="active"><i class="bi bi-clipboard me-2"></i> Exams</a>
            <a href="/teacher/marks" id="navMarks"><i class="bi bi-pencil-square me-2"></i> Enter Marks</a>
            <a href="/results"><i class="bi bi-bar-chart me-2"></i> Results</a>
            <a href="/" onclick="localStorage.removeItem('token');localStorage.removeItem('user');"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
        <div class="col-md-10 p-4">
            <h2 class="mb-4">Exam Management</h2>
            <div class="card p-4">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#examModal">Create Exam</button>
                <table class="table" id="examsTable">
                    <thead><tr><th>ID</th><th>Exam Name</th><th>Term</th><th>Year</th><th>Class</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="examModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Create Exam</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="examForm">
                <div class="modal-body">
                    <div class="mb-3"><label>Exam Name</label><input type="text" class="form-control" name="exam_name" required></div>
                    <div class="mb-3"><label>Term</label><select class="form-control" name="term"><option>First</option><option>Second</option><option>Third</option></select></div>
                    <div class="mb-3"><label>Year</label><input type="number" class="form-control" name="year" value="2024" required></div>
                    <div class="mb-3"><label>Class</label><select class="form-control" name="class_id" id="classSelect"></select></div>
                    <div class="mb-3"><label>Exam Date</label><input type="date" class="form-control" name="exam_date" required></div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Create</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token || !user.role || user.role !== 'admin') {
    window.location.href = '/dashboard';
}
document.getElementById('userName').textContent = user.full_name || 'User';
document.getElementById('userRole').textContent = (user.role || '').toUpperCase();

if (user.role === 'admin') {
    document.getElementById('navStudents').style.display = 'block';
    document.getElementById('navClasses').style.display = 'block';
    document.getElementById('navSubjects').style.display = 'block';
    document.getElementById('navMarks').style.display = 'block';
} else if (user.role === 'teacher') {
    document.getElementById('navMarks').style.display = 'block';
}

const api = axios.create({ baseURL: '', headers: { Authorization: `Bearer ${token}` } });

async function loadExams() {
    const [exams, classes] = await Promise.all([api.get('/api/exams'), api.get('/api/classes')]);
    const classMap = {};
    classes.data.forEach(c => classMap[c.id] = c.class_name);
    document.querySelector('#examsTable tbody').innerHTML = exams.data.map(e => `<tr>
        <td>${e.id}</td><td>${e.exam_name}</td><td>${e.term}</td><td>${e.year}</td>
        <td>${classMap[e.class_id] || e.class_id}</td><td>${e.exam_date}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteExam(${e.id})">Delete</button></td>
    </tr>`).join('');
    document.getElementById('classSelect').innerHTML = classes.data.map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');
}

async function deleteExam(id) {
    if (!confirm('Delete this exam?')) return;
    await api.delete(`/api/exams/${id}`);
    loadExams();
}

document.getElementById('examForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);
    data.exam_date = new Date(data.exam_date).toISOString().split('T')[0];
    await api.post('/api/exams', data);
    window.location.reload();
});
loadExams();
</script>
{% endblock %}
