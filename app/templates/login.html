{% extends "base.html" %}
{% block title %}Login - SRMS{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4"><i class="bi bi-mortarboard-fill text-primary"></i> SRMS</h2>
                    <h5 class="text-center mb-4">Login to your account</h5>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '';
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    try {
        const res = await axios.post('/api/login', formData, {
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        localStorage.setItem('token', res.data.access_token);
        
        const meRes = await axios.get('/api/me', {
            headers: { Authorization: `Bearer ${res.data.access_token}` }
        });
        localStorage.setItem('user', JSON.stringify(meRes.data));
        
        window.location.href = '/dashboard';
    } catch (err) {
        alert('Login failed: ' + (err.response?.data?.detail || 'Invalid credentials'));
    }
});
</script>
{% endblock %}
